<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Honnête – In Bearbeitung</title>

  <link rel="icon" type="image/png" sizes="32x32" href="icon_favicon.png">
  <link rel="shortcut icon" href="icon_favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon_home.png">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:20px;
      background:
        radial-gradient(circle at 30% 20%, rgba(172,132,0,0.25), transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(253,238,121,0.2), transparent 50%),
        linear-gradient(135deg, #342800, #1a1400);
      color:#fdee79;
    }

    .card{
      background:rgba(52,40,0,0.65);
      backdrop-filter:blur(20px);
      border-radius:25px;
      padding:40px 25px;
      width:90%;
      max-width:420px;
      box-shadow:0 0 40px rgba(172,132,0,0.3), inset 0 0 20px rgba(253,238,121,0.1);
      border:1px solid rgba(253,238,121,0.2);
    }

    .logo button{background:none;border:none;cursor:pointer;}
    .logo img{width:220px;margin-bottom:25px;}

    h1{font-size:28px;margin-bottom:15px;}
    .subtitle{color:#d6c06b;}

    .status{
      margin-top:25px;
      display:flex;
      justify-content:center;
      gap:10px;
      background:rgba(172,132,0,0.15);
      padding:12px;
      border-radius:25px;
    }

    .dot{
      width:10px;height:10px;background:#fdee79;border-radius:50%;
      animation:pulse 1.5s infinite;
    }

    @keyframes pulse{0%{opacity:1;}50%{opacity:0.3;}100%{opacity:1;}}

    .overlay{
      position:fixed;inset:0;
      background:rgba(0,0,0,0.55);
      backdrop-filter:blur(8px);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:1000;
    }

    .overlay.active{display:flex;}

    .login-box{
      width:100%;
      max-width:380px;
      background:rgba(52,40,0,0.92);
      border-radius:22px;
      padding:24px;
      border:1px solid rgba(253,238,121,0.22);
    }

    .login-title{font-size:22px;margin-bottom:10px;}

    .field{margin-bottom:12px;text-align:left;}
    .field input{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid rgba(253,238,121,0.2);
      background:rgba(255,255,255,0.05);
      color:#fdee79;
    }

    .login-actions{display:flex;gap:10px;margin-top:10px;}

    .primary-btn{
      flex:1;
      padding:12px;
      border:none;
      border-radius:10px;
      background:linear-gradient(90deg,#ac8400,#fdee79);
      font-weight:bold;
      cursor:pointer;
    }

    .secondary-btn{
      flex:1;
      padding:12px;
      border:none;
      border-radius:10px;
      background:rgba(255,255,255,0.05);
      color:#d6c06b;
      cursor:pointer;
    }

    .error-msg{color:#ffb8a6;margin-top:10px;}
  </style>
</head>

<body>

<div class="card">
  <div class="logo">
    <button id="logoTrigger">
      <img src="icon.png">
    </button>
  </div>

  <h1>Seite in Bearbeitung</h1>

  <p class="subtitle">
    Diese Seite wird aktuell überarbeitet.<br>
    Bald wieder verfügbar.
  </p>

  <div class="status">
    <span class="dot"></span>
    <span>Wir arbeiten daran</span>
  </div>
</div>

<div class="overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-title">Geschützter Zugang</div>

    <!-- NEU: Benutzer -->
    <div class="field">
      <input id="usernameInput" type="text" placeholder="Benutzer">
    </div>

    <!-- Passwort -->
    <div class="field">
      <input id="passwordInput" type="password" placeholder="Passwort">
    </div>

    <div class="login-actions">
      <button class="secondary-btn" id="cancelLogin">Abbrechen</button>
      <button class="primary-btn" id="submitLogin">Öffnen</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<script>
  const USER = "cmlth";
  const PASSWORD = "22042906";
  const TARGET_PAGE = "app.html";

  const logoTrigger = document.getElementById("logoTrigger");
  const loginOverlay = document.getElementById("loginOverlay");
  const cancelLogin = document.getElementById("cancelLogin");
  const submitLogin = document.getElementById("submitLogin");

  const usernameInput = document.getElementById("usernameInput");
  const passwordInput = document.getElementById("passwordInput");
  const errorMsg = document.getElementById("errorMsg");

  function openLogin(){
    loginOverlay.classList.add("active");
    usernameInput.focus();
  }

  function closeLogin(){
    loginOverlay.classList.remove("active");
    errorMsg.textContent = "";
  }

  function handleLogin(){
    const user = usernameInput.value.toLowerCase().trim();
    const pass = passwordInput.value.trim();

    if(user === USER && pass === PASSWORD){
      window.location.href = TARGET_PAGE;
    } else {
      errorMsg.textContent = "Benutzer oder Passwort falsch";
    }
  }

  logoTrigger.onclick = openLogin;
  cancelLogin.onclick = closeLogin;
  submitLogin.onclick = handleLogin;

  document.addEventListener("keydown", (e)=>{
    if(e.key === "Enter") handleLogin();
  });
</script>

</body>
</html>
