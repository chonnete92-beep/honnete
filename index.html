<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Honnête – In Bearbeitung</title>

  <link rel="icon" type="image/png" sizes="32x32" href="icon_favicon.png">
  <link rel="shortcut icon" href="icon_favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon_home.png">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:20px;
      background:
        radial-gradient(circle at 30% 20%, rgba(172,132,0,0.25), transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(253,238,121,0.2), transparent 50%),
        linear-gradient(135deg, #342800, #1a1400);
      color:#fdee79;
      overflow:hidden;
    }

    .card{
      background:rgba(52,40,0,0.65);
      backdrop-filter:blur(20px);
      border-radius:25px;
      padding:40px 25px;
      width:90%;
      max-width:420px;
      box-shadow:0 0 40px rgba(172,132,0,0.3), inset 0 0 20px rgba(253,238,121,0.1);
      border:1px solid rgba(253,238,121,0.2);
    }

    .logo button{
      background:none;
      border:none;
      cursor:pointer;
    }

    .logo img{
      width:220px;
      margin-bottom:25px;
    }

    h1{font-size:28px;margin-bottom:15px;}
    .subtitle{color:#d6c06b; line-height:1.4;}

    .status{
      margin-top:25px;
      display:flex;
      justify-content:center;
      gap:10px;
      background:rgba(172,132,0,0.15);
      padding:12px;
      border-radius:25px;
      align-items:center;
    }

    .dot{
      width:10px;
      height:10px;
      background:#fdee79;
      border-radius:50%;
      animation:pulse 1.5s infinite;
    }

    @keyframes pulse{
      0%{opacity:1;}
      50%{opacity:0.3;}
      100%{opacity:1;}
    }

    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.55);
      backdrop-filter:blur(8px);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:1000;
      padding:20px;
    }

    .overlay.active{display:flex;}

    .login-box,
    .face-box{
      width:100%;
      max-width:380px;
      background:rgba(52,40,0,0.92);
      border-radius:22px;
      padding:24px;
      border:1px solid rgba(253,238,121,0.22);
      box-shadow:0 0 35px rgba(172,132,0,0.18);
    }

    .login-title,
    .face-title{
      font-size:22px;
      margin-bottom:12px;
    }

    .field{
      margin-bottom:12px;
      text-align:left;
    }

    .field input{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid rgba(253,238,121,0.2);
      background:rgba(255,255,255,0.05);
      color:#fdee79;
      font-size:16px;
      outline:none;
      transition:0.2s;
    }

    .field input:focus{
      border-color:rgba(253,238,121,0.45);
      box-shadow:0 0 0 2px rgba(253,238,121,0.08);
    }

    .field input:disabled{
      opacity:0.45;
    }

    .login-actions{
      display:flex;
      gap:10px;
      margin-top:10px;
    }

    .primary-btn{
      flex:1;
      padding:12px;
      border:none;
      border-radius:10px;
      background:linear-gradient(90deg,#ac8400,#fdee79);
      font-weight:bold;
      color:#2b2200;
      cursor:pointer;
      transition:0.2s;
    }

    .secondary-btn{
      flex:1;
      padding:12px;
      border:none;
      border-radius:10px;
      background:rgba(255,255,255,0.05);
      color:#d6c06b;
      cursor:pointer;
      transition:0.2s;
    }

    .primary-btn:disabled,
    .secondary-btn:disabled{
      opacity:0.45;
      cursor:not-allowed;
    }

    .error-msg{
      color:#ffcfbf;
      margin-top:12px;
      min-height:20px;
      font-size:14px;
    }

    .shake{
      animation:shake 0.35s linear;
    }

    @keyframes shake{
      0%{transform:translateX(0);}
      20%{transform:translateX(-8px);}
      40%{transform:translateX(8px);}
      60%{transform:translateX(-6px);}
      80%{transform:translateX(6px);}
      100%{transform:translateX(0);}
    }

    .face-wrap{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:16px;
    }

    .face-id{
      width:94px;
      height:94px;
      border-radius:24px;
      border:2px solid rgba(253,238,121,0.7);
      position:relative;
      box-shadow:
        0 0 20px rgba(253,238,121,0.12),
        inset 0 0 16px rgba(253,238,121,0.08);
    }

    .face-id::before,
    .face-id::after{
      content:"";
      position:absolute;
      left:12px;
      right:12px;
      height:2px;
      background:rgba(253,238,121,0.35);
      border-radius:2px;
    }

    .face-id::before{top:28px;}
    .face-id::after{bottom:28px;}

    .scan-line{
      position:absolute;
      left:10px;
      right:10px;
      height:3px;
      border-radius:3px;
      background:linear-gradient(90deg, transparent, #fdee79, transparent);
      box-shadow:0 0 12px rgba(253,238,121,0.7);
      animation:scan 1.5s ease-in-out infinite;
    }

    @keyframes scan{
      0%{top:16px; opacity:0.25;}
      50%{top:72px; opacity:1;}
      100%{top:16px; opacity:0.25;}
    }

    .face-subtitle{
      color:#d6c06b;
      line-height:1.4;
      font-size:15px;
    }
  </style>
</head>

<body>

<div class="card">
  <div class="logo">
    <button id="logoTrigger" aria-label="Login öffnen">
      <img src="icon.png" alt="Honnête Logo">
    </button>
  </div>

  <h1>Seite in Bearbeitung</h1>

  <p class="subtitle">
    Diese Seite wird aktuell überarbeitet.<br>
    Bald wieder verfügbar.
  </p>

  <div class="status">
    <span class="dot"></span>
    <span>Wir arbeiten daran</span>
  </div>
</div>

<div class="overlay" id="loginOverlay">
  <div class="login-box" id="loginBox">
    <div class="login-title">Geschützter Zugang</div>

    <div class="field">
      <input id="usernameInput" type="text" placeholder="Benutzer" autocomplete="username">
    </div>

    <div class="field">
      <input id="passwordInput" type="password" placeholder="Passwort" autocomplete="current-password">
    </div>

    <div class="login-actions">
      <button class="secondary-btn" id="cancelLogin">Abbrechen</button>
      <button class="primary-btn" id="submitLogin">Öffnen</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<div class="overlay" id="faceOverlay">
  <div class="face-box">
    <div class="face-wrap">
      <div class="face-title">Identität wird geprüft</div>

      <div class="face-id">
        <div class="scan-line"></div>
      </div>

      <div class="face-subtitle">
        Face ID wird geprüft
      </div>
    </div>
  </div>
</div>

<script>
  const USER = "cmlth";
  const PASSWORD = "22042906";
  const TARGET_PAGE = "app.html";
  const LOCK_TIME = 60000;

  const logoTrigger = document.getElementById("logoTrigger");
  const loginOverlay = document.getElementById("loginOverlay");
  const faceOverlay = document.getElementById("faceOverlay");
  const loginBox = document.getElementById("loginBox");

  const cancelLogin = document.getElementById("cancelLogin");
  const submitLogin = document.getElementById("submitLogin");

  const usernameInput = document.getElementById("usernameInput");
  const passwordInput = document.getElementById("passwordInput");
  const errorMsg = document.getElementById("errorMsg");

  function isLocked(){
    const lockedUntil = Number(localStorage.getItem("honnete_lock_until") || "0");
    return Date.now() < lockedUntil;
  }

  function applyLockState(){
    if(isLocked()){
      usernameInput.disabled = true;
      passwordInput.disabled = true;
      submitLogin.disabled = true;
      errorMsg.textContent = "Sicherheitssperre";
    } else {
      usernameInput.disabled = false;
      passwordInput.disabled = false;
      submitLogin.disabled = false;
      if(errorMsg.textContent === "Sicherheitssperre"){
        errorMsg.textContent = "";
      }
    }
  }

  function triggerLock(){
    localStorage.setItem("honnete_lock_until", String(Date.now() + LOCK_TIME));
    applyLockState();

    setTimeout(() => {
      applyLockState();
    }, LOCK_TIME + 100);
  }

  function openLogin(){
    loginOverlay.classList.add("active");
    applyLockState();
    setTimeout(() => {
      if(!isLocked()) usernameInput.focus();
    }, 120);
  }

  function closeLogin(){
    loginOverlay.classList.remove("active");
    errorMsg.textContent = "";
    usernameInput.value = "";
    passwordInput.value = "";
    loginBox.classList.remove("shake");
  }

  function showFaceCheck(){
    loginOverlay.classList.remove("active");
    faceOverlay.classList.add("active");

    setTimeout(() => {
      window.location.href = TARGET_PAGE;
    }, 1800);
  }

  function handleLogin(){
    applyLockState();
    if(isLocked()) return;

    const user = usernameInput.value.toLowerCase().trim();
    const pass = passwordInput.value.trim();

    if(user === USER && pass === PASSWORD){
      errorMsg.textContent = "";
      showFaceCheck();
    } else {
      errorMsg.textContent = "Sicherheitssperre";
      loginBox.classList.remove("shake");
      void loginBox.offsetWidth;
      loginBox.classList.add("shake");
      triggerLock();
    }
  }

  logoTrigger.onclick = openLogin;
  cancelLogin.onclick = closeLogin;
  submitLogin.onclick = handleLogin;

  document.addEventListener("keydown", (e)=>{
    if(!loginOverlay.classList.contains("active")) return;
    if(e.key === "Enter") handleLogin();
    if(e.key === "Escape") closeLogin();
  });

  applyLockState();
</script>

</body>
</html>
