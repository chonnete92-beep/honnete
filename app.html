<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Honnête App</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html, body{
      min-height:100%;
    }

    body{
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height:100vh;
      padding:20px;
      background:
        radial-gradient(circle at 30% 20%, rgba(172,132,0,0.25), transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(253,238,121,0.2), transparent 50%),
        linear-gradient(135deg, #342800, #1a1400);
      color:#fdee79;
    }

    .app{
      width:100%;
      max-width:980px;
      margin:0 auto;
    }

    /* TOPBAR */
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:18px;
      gap:12px;
    }

    .logo img{
      height:34px;
      width:auto;
      display:block;
      opacity:0.95;
    }

    .topbar button{
      padding:10px 16px;
      border-radius:14px;
      border:1px solid rgba(253,238,121,0.22);
      background:rgba(52,40,0,0.55);
      color:#fdee79;
      font-size:14px;
      cursor:pointer;
      backdrop-filter:blur(10px);
      transition:0.2s;
      -webkit-appearance:none;
      appearance:none;
    }

    .topbar button:hover{
      background:rgba(253,238,121,0.15);
    }

    /* GRID */
    .grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:16px;
    }

    /* CARD */
    .card{
      min-height:170px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      background:rgba(52,40,0,0.65);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      border-radius:22px;
      padding:24px 16px;
      text-align:center;
      border:1px solid rgba(253,238,121,0.18);
      transition:transform 0.2s ease, background 0.2s ease;
      cursor:pointer;
    }

    .card:hover{
      transform:scale(1.02);
    }

    .icon{
      font-size:40px;
      line-height:1;
      margin-bottom:12px;
    }

    .title{
      font-size:17px;
      font-weight:600;
    }

    .sub{
      font-size:13px;
      color:#bba94d;
      margin-top:6px;
    }

    .disabled{
      opacity:0.5;
      cursor:default;
    }

    .disabled:hover{
      transform:none;
    }

    @media (min-width:900px){
      body{
        padding:28px;
      }

      .grid{
        gap:20px;
      }

      .card{
        min-height:180px;
      }
    }

    @media (max-width:480px){
      body{
        padding:14px;
      }

      .topbar{
        margin-bottom:14px;
      }

      .logo img{
        height:30px;
      }

      .topbar button{
        padding:9px 14px;
        font-size:13px;
        border-radius:12px;
      }

      .grid{
        gap:12px;
      }

      .card{
        min-height:150px;
        border-radius:20px;
        padding:20px 12px;
      }

      .icon{
        font-size:36px;
      }

      .title{
        font-size:15px;
      }

      .sub{
        font-size:12px;
      }
    }
  </style>
</head>

<body>

  <div class="app">

    <div class="topbar">
      <div class="logo">
        <img src="icon.png" alt="Honnête Logo">
      </div>

      <button onclick="logout()">Abmelden</button>
    </div>

    <div class="grid">

      <div class="card" onclick="openFamily()">
        <div class="icon">👨‍👩‍👧‍👧</div>
        <div class="title">Familie</div>
      </div>

      <div class="card disabled">
        <div class="icon">💰</div>
        <div class="title">Finanzen</div>
        <div class="sub">In Bearbeitung</div>
      </div>

      <div class="card disabled">
        <div class="icon">🏡</div>
        <div class="title">Immobilien</div>
        <div class="sub">In Bearbeitung</div>
      </div>

      <div class="card disabled">
        <div class="icon">🛒</div>
        <div class="title">Einkauf</div>
        <div class="sub">In Bearbeitung</div>
      </div>

      <div class="card disabled">
        <div class="icon">📅</div>
        <div class="title">Termine</div>
        <div class="sub">In Bearbeitung</div>
      </div>

      <div class="card disabled">
        <div class="icon">⚙️</div>
        <div class="title">Tools</div>
        <div class="sub">In Bearbeitung</div>
      </div>

      <div class="card disabled">
        <div class="icon">📝</div>
        <div class="title">Notizen</div>
        <div class="sub">In Bearbeitung</div>
      </div>

      <div class="card disabled">
        <div class="icon">🔧</div>
        <div class="title">Einstellungen</div>
        <div class="sub">In Bearbeitung</div>
      </div>

    </div>

  </div>

  <script>
    function openFamily(){
      alert("Familie App kommt als nächstes 👨‍👩‍👧‍👧");
      // später:
      // window.location.href = "familie.html";
    }

    function logout(){
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
